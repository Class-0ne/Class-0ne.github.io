      - company: Vehicle Control Lab, Hanyang University
        position: M.S. Student Researcher
        location: Seoul, South Korea
        start_date: 2025
        end_date: Present
        summary: Data-enabled predictive control for EV thermal management systems.
        highlights:
          - "Research topic: Data-enabled Predictive Control for EV Thermal Management System"
          - "DeePC-based control design and validation for EV thermal systems"
          - "Control-oriented simulation and evaluation workflow development"

      - company: Hyundai Motor Company Industry Projects
        position: Participating Researcher / Working-level Lead
        location: South Korea
        start_date: 2025
        end_date: Present
        summary: Multiple industry-sponsored projects spanning regenerative braking, model-free thermal management, and data-driven AI prediction.
        highlights:
          - Personalized regenerative braking control based on driver preference and intervention modeling
          - Model-free EV integrated thermal management control using DeePC
          - Brake thermal capacity prediction platform with AI models and LLM-based multi-agent service

      - company: LG Electronics Industry Project
        position: Participating Researcher -> Working-level Lead
        location: South Korea
        start_date: 2025
        end_date: 2025
        summary: Data-driven compressor differential restart load modeling and MPC control design.
        highlights:
          - LSTM-based load torque prediction model for electric compressor restart
          - IPMSM dq-axis model-based MPC controller design with voltage constraints
          - Project leadership transition after prior lead graduated

    Projects:
      - name: Hyundai | Personalized Regenerative Braking Control
        summary: GPR 기반 운전자 선호/개입 모델링과 energy-aware 제동거리 최적화를 결합한 개인화 회생제동 제어 연구.
        highlights:
          - GPR-based BPS and APS modeling
          - Trade-off based optimal braking distance design
          - Simulink implementation and CarMaker validation
        start_date: 2025
        end_date: Present

      - name: LG | Compressor Restart Load Modeling and MPC
        summary: 차압기동 부하 예측을 위한 LSTM 모델과 IPMSM dq-axis MPC 제어기 설계 프로젝트.
        highlights:
          - LSTM load torque prediction pipeline
          - MPC speed tracking with voltage constraints
          - Detailed controller design document
        start_date: 2025
        end_date: 2025

      - name: Hyundai | Model-Free EV Thermal Management DeePC
        summary: 물리 모델 의존성을 줄인 EV 통합 열관리 DeePC 프레임워크 개발.
        highlights:
          - Simulink/Simscape integrated thermal model setup
          - DeePC input/output data generation and Hankel matrix framework
          - Multi-scenario control performance validation
        start_date: 2026
        end_date: Present

    Publications:
      - title: Personalized Energy-Aware Regenerative Braking Control Minimizing Driver Interventions
        publisher: IFAC Online Paper
        date: 2026-01-01
        summary: Submitted manuscript based on personalized energy-aware regenerative braking control research.

