cv:
  name: 이재환 (Lee Jae Hwan)
  label: Graduate Researcher in Automotive Control Engineering
  email: hwani0914@hanyang.ac.kr (school) / hwani0914@gmail.com (personal)
  address:
    city: Seoul
    region: South Korea
  summary: >
    Graduate researcher in automotive control engineering (M.S. expected Feb. 2027),
    specializing in data-driven and model-based control for vehicle energy systems.
    Experienced in applying MPC and DeePC to EV thermal management and regenerative braking,
    with hands-on implementation across MATLAB/Simulink and co-simulation environments.

  social_networks:
    - network: GitHub
      username: Class-0ne

  sections:
    Education:
      - institution: Hanyang University
        location: Seoul, South Korea
        area: Department of Automotive Engineering
        studyType: M.S.
        start_date: Mar. 2025
        end_date: Feb. 2027
        highlights:
          - "Research topic: Data-enabled Predictive Control for EV Thermal Management System"
          - "Advisor: Prof. Kyungseok Han (VOICE Lab)"

      - institution: Kyungpook National University
        location: Daegu, South Korea
        area: School of Mechanical Engineering
        studyType: B.S.
        start_date: Mar. 2019
        end_date: Feb. 2025

    Industry-Academia Projects:
      - company: Hyundai Motor Company
        position: Model-Free Predictive Control for EV Integrated Thermal Management
        start_date: Apr. 2026
        end_date: Nov. 2026
        summary: Working-level Lead
        highlights:
          - "Problem: Need real-time control of battery, motor, inverter, and HVAC thermal interactions without relying on high-fidelity physics models"
          - "Approach: Built a Simulink/Simscape EV thermal model, collected DeePC training I/O data, and constructed a Hankel-matrix-based model-free predictive control framework"
          - "Target: Cabin temperature tracking error within 10%, battery/PE safety violation rate within 5%, and average controller runtime under 1 s"

      - company: Hyundai Motor Company
        position: Data-Driven AI Modeling for Brake Thermal Capacity Prediction
        start_date: May 2026
        end_date: Dec. 2026
        summary: Working-level Lead
        highlights:
          - "Problem: Brake thermal capacity data are fragmented across tests, making early design-stage use difficult and reducing prediction consistency"
          - "Approach: Built an integrated test database and web search platform, developed AI prediction models using design parameters, and implemented an LLM-based role-specialized multi-agent web service"
          - "Target: Database with more than 100 test cases and average AI prediction error below 10%"

      - company: Hyundai Motor Company
        position: Personalized Regenerative Braking Control for Urban Driving
        start_date: Jul. 2025
        end_date: Jul. 2026
        summary: Participating Researcher
        highlights:
          - "Problem: Conventional automatic regenerative braking maximizes energy recovery alone and can trigger driver interventions that reduce actual recovery opportunities"
          - "Approach: Modeled driver preference and intervention distributions with GPR, then optimized braking distance based on the intervention-energy trade-off; implemented in MATLAB/Simulink and validated in CarMaker"
          - "Outcome: Submitted IFAC Online Paper, _Personalized Energy-Aware Regenerative Braking Control Minimizing Driver Interventions_"

      - company: LG Electronics
        position: Data-Driven Differential Restart Load Modeling and MPC Control
        start_date: Mar. 2025
        end_date: Dec. 2025
        summary: Participating Researcher -> Working-level Lead
        highlights:
          - "Problem: Existing simulations reflected only nominal operation, causing sim-to-real error during differential restart and requiring 2-3 weeks for repeated validation and tuning"
          - "Approach: Built a 50-step LSTM load torque prediction pipeline from three-phase current and PWM signals, and designed an IPMSM dq-axis MPC controller for speed tracking under voltage constraints"
          - "Outcome: Completed the LSTM pipeline, MPC controller code, and detailed design documentation; led the project in the later phase after the previous lead graduated"

    Publications:
      - title: Personalized Energy-Aware Regenerative Braking Control Minimizing Driver Interventions
        publisher: IFAC Online Paper
        summary: Submitted, under review.

    Conference Presentations:
      - title: 전기자동차용 IPMSM의 에너지 최적 제어를 위한 MTPA-MPC 기법
        publisher: 한국자동차공학회 추계학술대회 포스터 발표
        summary: 2025

    Skills:
