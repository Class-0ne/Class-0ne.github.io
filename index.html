<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="개인 홈페이지">
    <title>Class-0ne | Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Class-0ne</div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="blog/index.html">Blog</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-layout">
        <!-- 왼쪽 사이드바: 프로필 -->
        <aside class="sidebar">
            <div class="profile-card">
                <div class="profile-image">
                    <img src="https://via.placeholder.com/150" alt="Profile">
                </div>
                <h2>Class-0ne</h2>
                <p class="profile-bio">소프트웨어 개발에 관심이 있는 개발자입니다.</p>

                <div class="skills-section">
                    <h3>Skills</h3>
                    <div class="skill-tags">
                        <span>JavaScript</span>
                        <span>TypeScript</span>
                        <span>HTML/CSS</span>
                        <span>React</span>
                        <span>Node.js</span>
                        <span>Git</span>
                    </div>
                </div>

                <div class="projects-section">
                    <h3>Projects</h3>
                    <ul class="project-list">
                        <li><a href="#">프로젝트 1</a></li>
                        <li><a href="#">프로젝트 2</a></li>
                        <li><a href="#">프로젝트 3</a></li>
                    </ul>
                </div>

                <div class="contact-section">
                    <h3>Contact</h3>
                    <div class="social-links">
                        <a href="mailto:your.email@example.com" title="Email">📧</a>
                        <a href="https://github.com/Class-0ne" target="_blank" title="GitHub">💻</a>
                        <a href="https://linkedin.com/in/yourprofile" target="_blank" title="LinkedIn">💼</a>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 중앙 및 오른쪽: 블로그 -->
        <section class="content-area">
            <div class="blog-header">
                <h1>최근 포스트</h1>
                <div class="category-filter">
                    <button class="filter-btn active" data-category="all">전체</button>
                    <button class="filter-btn" data-category="일상">일상</button>
                    <button class="filter-btn" data-category="공지">공지</button>
                    <button class="filter-btn" data-category="test1">test1</button>
                </div>
            </div>

            <div id="blog-posts" class="blog-grid">
                <!-- 블로그 포스트가 여기에 동적으로 로드됩니다 -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Class-0ne. All rights reserved.</p>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/home-blog.js"></script>
</body>
</html>
