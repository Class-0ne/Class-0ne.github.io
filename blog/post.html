<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post | Class-0ne Blog</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .post-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 100px 20px 50px;
        }

        .post-header {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid var(--border-color);
        }

        .post-title {
            font-size: 2.5rem;
            color: var(--text-color);
            margin-bottom: 1rem;
        }

        .post-meta {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .post-meta span {
            margin-right: 1.5rem;
        }

        .post-content {
            line-height: 1.8;
            color: var(--text-color);
            font-size: 1.05rem;
        }

        .post-content h1 {
            font-size: 2rem;
            margin: 2rem 0 1rem;
            color: var(--text-color);
        }

        .post-content h2 {
            font-size: 1.6rem;
            margin: 1.8rem 0 1rem;
            color: var(--text-color);
        }

        .post-content h3 {
            font-size: 1.3rem;
            margin: 1.5rem 0 0.8rem;
            color: var(--text-color);
        }

        .post-content p {
            margin-bottom: 1.2rem;
        }

        .post-content ul, .post-content ol {
            margin-bottom: 1.2rem;
            padding-left: 2rem;
        }

        .post-content li {
            margin-bottom: 0.5rem;
        }

        .post-content code {
            background-color: #f5f5f5;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .post-content pre {
            background-color: #f5f5f5;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 1.2rem;
        }

        .post-content pre code {
            background-color: transparent;
            padding: 0;
        }

        .post-content blockquote {
            border-left: 4px solid var(--primary-color);
            padding-left: 1rem;
            margin: 1.2rem 0;
            color: var(--text-light);
            font-style: italic;
        }

        .post-content a {
            color: var(--primary-color);
            text-decoration: none;
            border-bottom: 1px solid var(--primary-color);
        }

        .post-content a:hover {
            color: var(--secondary-color);
        }

        .post-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 1rem 0;
        }

        .post-content strong {
            font-weight: 600;
            color: var(--text-color);
        }

        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .back-link:hover {
            color: var(--secondary-color);
        }

        .back-link::before {
            content: "← ";
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">Class-0ne</div>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../index.html#about">About</a></li>
                <li><a href="../index.html#projects">Projects</a></li>
                <li><a href="index.html">Blog</a></li>
                <li><a href="../index.html#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="post-container">
        <a href="index.html" class="back-link">블로그 목록으로</a>

        <article id="post">
            <div class="loading">포스트를 불러오는 중...</div>
        </article>
    </main>

    <footer>
        <p>&copy; 2025 Class-0ne. All rights reserved.</p>
    </footer>

    <script>
        // URL에서 파일명 가져오기
        const urlParams = new URLSearchParams(window.location.search);
        const filename = urlParams.get('file');

        if (!filename) {
            document.getElementById('post').innerHTML = '<div class="loading">포스트를 찾을 수 없습니다.</div>';
        } else {
            // 마크다운 파일 로드 및 변환
            fetch(`posts/${filename}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('파일을 찾을 수 없습니다.');
                    }
                    return response.text();
                })
                .then(markdown => {
                    // 마크다운을 HTML로 변환
                    const html = marked.parse(markdown);

                    // 메타 정보 추출 (첫 번째 # 제목과 **작성일** 형식)
                    const titleMatch = markdown.match(/^#\s+(.+)$/m);
                    const dateMatch = markdown.match(/\*\*작성일:\*\*\s+(.+)$/m);
                    const categoryMatch = markdown.match(/\*\*카테고리:\*\*\s+(.+)$/m);

                    const title = titleMatch ? titleMatch[1] : '제목 없음';
                    const date = dateMatch ? dateMatch[1] : '';
                    const category = categoryMatch ? categoryMatch[1] : '';

                    // 문서 제목 변경
                    document.title = `${title} | Class-0ne Blog`;

                    // 포스트 렌더링
                    document.getElementById('post').innerHTML = `
                        <div class="post-header">
                            <h1 class="post-title">${title}</h1>
                            <div class="post-meta">
                                ${date ? `<span>📅 ${date}</span>` : ''}
                                ${category ? `<span>📁 ${category}</span>` : ''}
                            </div>
                        </div>
                        <div class="post-content">
                            ${html}
                        </div>
                    `;
                })
                .catch(error => {
                    document.getElementById('post').innerHTML = `
                        <div class="loading">포스트를 불러오는데 실패했습니다.<br>${error.message}</div>
                    `;
                });
        }
    </script>
</body>
</html>
