<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Class-0ne 블로그">
    <title>Blog | Class-0ne</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .blog-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 100px 20px 50px;
        }

        .blog-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .blog-header h1 {
            font-size: 2.5rem;
            color: var(--text-color);
            margin-bottom: 0.5rem;
        }

        .blog-header p {
            color: var(--text-light);
            font-size: 1.1rem;
        }

        .post-list {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .post-item {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .post-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .post-item h2 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .post-item h2 a {
            color: var(--text-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .post-item h2 a:hover {
            color: var(--primary-color);
        }

        .post-meta {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .post-meta span {
            margin-right: 1rem;
        }

        .post-excerpt {
            color: var(--text-light);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .read-more {
            color: var(--primary-color);
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .read-more:hover {
            transform: translateX(5px);
        }

        .read-more::after {
            content: " →";
        }

        .no-posts {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">Class-0ne</div>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../index.html#about">About</a></li>
                <li><a href="../index.html#projects">Projects</a></li>
                <li><a href="index.html">Blog</a></li>
                <li><a href="../index.html#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="blog-container">
        <div class="blog-header">
            <h1>Blog</h1>
            <p>개발과 일상에 대한 이야기</p>
        </div>

        <div id="post-list" class="post-list">
            <!-- 포스트 목록이 여기에 동적으로 로드됩니다 -->
        </div>
    </main>

    <footer>
        <p>&copy; 2025 Class-0ne. All rights reserved.</p>
    </footer>

    <script src="blog.js"></script>
</body>
</html>
